<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>Nova OS</title>
	<link href="style.css" rel="stylesheet" type="text/css" />
	<script src="SuperNova/system32.js" defer></script>
	<script src="script.js" defer></script>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
	<noscript>
		<h1>I don't even know what time is it now. Who to say? your browser...</h1>
		<p>Well your browser seems to be messing around turning off some JS...</p>
		<b>If you have set JS to be desabled:</b>
		<p>
			<ul>
				<li>We do not do illegal, or bad stuff, like selling your data without permission or running bad code
					that will harm your device.</li>
				<li>This is not 1999, and your browser - every single new browsers on the market has very cool rules
					just to make you safe.</li>
				<li>You can always <b><a href="https://www.larimer.gov/it/enable-javascript"> turn JS on</a>.</b></li>
			</ul>
		</p>
	</noscript>

	<div class="container" id="desktop">
		<div onclick="openapp('clock', 1)" class="app-shortcut">
			<span class="material-icons app-icon">
				timer
			</span>
			<span class="appname">Clock</span>
		</div>
		<div onclick="openapp('text', 1)" class="app-shortcut">
			<span class="material-icons app-icon">
				edit_note
			</span>
			<span class="appname">Text</span>
		</div>
	</div>
	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

	<script>
		$(function () {
			$(".container").sortable();
		});
	</script>

	<nav>
		<quicks navobj>
			<div app-shortcut onclick="openapp('files', 1)">
				<span ic class="material-icons">
					folder
				</span>
			</div>
			<div app-shortcut onclick="openapp('camera', 1)">
				<span ic class="material-icons">
					photo_camera
				</span>
			</div>
			<div app-shortcut onclick="openapp('settings', 1)">
				<span ic class="material-icons">
					settings
				</span>
			</div>
		</quicks>
		<your navobj>
			<div app-shortcut>
				<span ic class="material-icons" id="mm" onclick="document.getElementById('appdmod').showModal()">N?
				</span>
			</div>
			<g id="your-apps">

			</g>
		</your>
		<info navobj>
			<div>
				<span id="battery-p-display">
					%
				</span>
				<span id="battery-display" class="material-icons">
					p ic
				</span>
			</div>
			<div>
				<span id="time-display">time</span><br>
				<span id="date-display">date</span>
			</div>
		</info>
	</nav>
	<dialog id="appdmod">
		<div>
			<h1>Apps</h1>
		</div>
		<div id="appdeck">
			<div onclick="openapp('text', 1)" class="app-shortcut">
				<span class="material-icons app-icon">
					edit_note
				</span>
				<span class="appname">Text</span>
			</div>
			<div onclick="openapp('store', 1)" class="app-shortcut">
				<span class="material-icons app-icon">
					shopping_bag
				</span>
				<span class="appname">Store</span>
			</div>
			<div onclick="openapp('media', 1)" class="app-shortcut">
				<span class="material-icons app-icon">live_tv</span>
				<span class="appname">Media Viewer</span>
			</div>
		</div>
	</dialog>
	<dialog id="installer">
		<div appinfos>
			<span id="installer-icon" class="material-icons">
				book
			</span>
			<h1>App Name</h1>
			<small>data</small>
		</div>
		<button id="installer-installbtn" onclick="installerProc()">Install</button>

	</dialog>
</body>

</html>
