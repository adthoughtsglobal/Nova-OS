<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>Nova OS</title>
	<link href="style.css" rel="stylesheet" type="text/css" />
	<script src="script.js" defer></script>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
	<noscript>
		<h1>No JS?</h1>
		<p>Well your browser seems to be playing with us.. is it 1999?</p>
		<b>If you have set JS to be desabled:</b>
		<p>
			<ul>
				<li>We do not do illegal, or bad stuff, like selling your data without permission or running bad code
					that will harm your device.</li>
				<li>This is not 1999, and your browser - every single new browsers on the market has very cool rules
					just to make you safe.</li>
				<li>You can always <b>Turn JS on.</b></li>
			</ul>
		</p>
	</noscript>
	
	<div class="container">
		<div onclick="openapp('clock')" class="app-shortcut">
			<span class="material-icons app-icon">
				timer
			</span>
			<span class="appname">Clock</span>
		</div>
		<div onclick="openapp('clock')" class="app-shortcut">
			<span class="material-icons app-icon">
				download
			</span>
			<span class="appname">downloads</span>
		</div>
	</div>
	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

	<script>
	  $(function() {
		$(".container").sortable();
	  });
	</script>

	<nav>
		<quicks navobj>
			<div app-shortcut onclick="openapp('files')">
				<span ic class="material-icons">
					folder
				</span>
			</div>
			<div app-shortcut onclick="openapp('camera')">
				<span ic class="material-icons">
					photo_camera
				</span>
			</div>
			<div app-shortcut onclick="openapp('settings')">
				<span ic class="material-icons">
					settings
				</span>
			</div>
		</quicks>
		<your navobj>
			<div app-shortcut>
				<span ic class="material-icons" id="mm">N
				</span>
			</div>
			<g id="your-apps">

			</g>
		</your>
		<info navobj>
			<div>
				<span id="battery-p-display">
					%
				</span>
				<span id="battery-display" class="material-icons">
					p ic
				</span>
			</div>
			<div>
				<span id="time-display">time</span><br>
				<span id="date-display">date</span>
			</div>
		</info>
	</nav>
</body>

</html>
