<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>Nova OS</title>
	<link href="style.css" rel="stylesheet" type="text/css" />
	<script src="SuperNova/system32.js" defer></script>
	<!-- Include pako library (CDN) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.3/pako.min.js"></script>
	</script>

	<script src="script.js" defer></script>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
	<noscript>
		<h1>I don't even know what time is it now. Who to say? your browser...</h1>
		<p>Well your browser seems to be messing around turning off some JS...</p>
		<b>If you have set JS to be desabled:</b>
		<p>Nova OS require JS to run.
			<li>You can always <b><a href="https://www.larimer.gov/it/enable-javascript"> turn JS on</a>.</b></li>
			</ul>
		</p>
	</noscript>

	<div class="container" id="desktop">
		<span class="deskloadspan">Desktop Is loading...</span>
	</div>
	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

	<script>
		$(function () {
			$(".container").sortable();
		});
	</script>

	<nav id="novanav">
		<quicks navobj id="dock">
			<div app-shortcut onclick="openapp('files', 1)">
				<span ic class="material-icons">
					folder
				</span>
			</div>
			<div app-shortcut onclick="openapp('camera', 1)">
				<span ic class="material-icons">
					photo_camera
				</span>
			</div>
			<div app-shortcut onclick="openapp('settings', 1)">
				<span ic class="material-icons">
					settings
				</span>
			</div>
		</quicks>
		<your navobj>
			<div app-shortcut>
				<span ic class="material-icons" id="mm" onclick="openn()">N?
				</span>
			</div>
			<g id="your-apps">

			</g>
		</your>
		<info navobj>
			<div>
				<span id="battery-p-display">
					%
				</span>
				<span id="battery-display" class="material-icons">
					p ic
				</span>
			</div>
			<div>
				<span id="time-display">time</span><br>
				<span id="date-display">date</span>
			</div>
		</info>
		<info class="">
			
		</info>
	</nav>
	<dialog id="appdmod">
		<div>
			<h1>Apps</h1>
		</div>
		<div id="appdeck">
			<div id="appsindeck">
				
			</div>
		</div>
		<div class="strtappsugs" id="strtappsugs">
			apps appear here
		</div>
		<input placeholder="Search an app..." autocomplete="off" id="strtsear" onkeyup="strtappse()">
	</dialog>
	<dialog id="startup">
		<div class="content">
			<div class="custom-loader2"></div>
			<h1 id="startuptx">Setting up your OS</h1>
		</div>
	</dialog>
</body>

</html>
