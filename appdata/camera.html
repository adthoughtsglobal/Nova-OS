<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera App</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    #video-container {
      position: relative;
    }

    #video {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      transform: scaleX(1); /* Initial scaling without mirroring */
      transition: transform 0.3s ease-in-out;
    }

    #camera-select {
      position: absolute;
      top: 10px;
      right: 10px;
		background-color: transparent;
		backdrop-filter: blur(3px) brightness(50%);
		color: grey;
		border: none;
		padding: 5px;
		border-radius: 5px;
    }

    #mirror-btn {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 8px;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" playsinline autoplay></video>
    <select id="camera-select"></select>
    <button id="mirror-btn" onclick="toggleMirror()">Mirror</button>
  </div>

  <script>
    let isMirrored = false;

    async function getVideoSources() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(device => device.kind === 'videoinput');
      return cameras;
    }

    async function startCamera() {
      const video = document.getElementById('video');
      const cameras = await getVideoSources();
      const cameraSelect = document.getElementById('camera-select');

      cameras.forEach(camera => {
        const option = document.createElement('option');
        option.value = camera.deviceId;
        option.text = camera.label || `Camera ${cameraSelect.length + 1}`;
        cameraSelect.appendChild(option);
      });

      cameraSelect.addEventListener('change', async () => {
        const selectedCameraId = cameraSelect.value;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: selectedCameraId } });
        video.srcObject = stream;
        resetMirror();
      });

      if (cameras.length > 0) {
        const defaultCameraId = cameras[0].deviceId;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: defaultCameraId } });
        video.srcObject = stream;
      }
    }

    function toggleMirror() {
      const video = document.getElementById('video');
      isMirrored = !isMirrored;
      video.style.transform = `scaleX(${isMirrored ? -1 : 1})`;
    }

    function resetMirror() {
      const video = document.getElementById('video');
      isMirrored = false;
      video.style.transform = 'scaleX(1)';
    }

	  function greenflag() {
		  startCamera()
	  }
  </script>
</body>
</html>
