<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Settings App</title>
	<style>
		* {
			box-sizing: border-box
		}

		html {
			height: calc(100% - 0px);
		}

		body {
			color: white;
			height: 100%;
			margin: 0px;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 12px;
		}

		/* Style the tab */
		.tab {
			float: left;
			border: 1px solid #1f1f1f;
			background-color: #1f1f1f;
			width: 30%;
			height: 100%;
			color: white;
		}

		.tab h3 {
			padding-left: 5px;
		}

		/* Style the buttons inside the tab */
		.tab button {
			color: white;
			display: block;
			background-color: inherit;
			padding: 5px 7px;
			width: 100%;
			border: none;
			outline: none;
			text-align: left;
			cursor: pointer;
			transition: 0.3s;
			font-size: 13px;
		}

		/* Change background color of buttons on hover */
		.tab button:hover {
			background-color: #2f2f2f;
		}

		/* Create an active/current "tab button" class */
		.tab button.active {
			background-color: #2f2f2f;
		}

		/* Style the tab content */
		.tabcontent {
			float: left;
			padding: 0px 12px;
			border: 1px solid #1f1f1f;
			width: 70%;
			background-color: #101010;
			border-left: none;
			height: 100%;
		}

		container {
			height: 100%;
			display: block;
		}

		td {
			padding: 5px 15px;
		}
	</style>
</head>

<body>
	<container>
		<div class="tab">
			<h3>Settings</h3>
			 <button class="tablinks" onclick="openCity(event, 'battery')">Battery</button>
			<button class="tablinks" onclick="openCity(event, 'about')" id="defaultOpen">About</button>
		</div>

		<div id="about" class="tabcontent">
			<h2>About</h2>
			<p>You are Using Nova OS Web. <br>Thank you for being in the Nova Ecosystem.</p>
			<h3>Credits</h3>
			<table>
				<tbody style="width: 100%;">
					<tr>
						<td>adthoughtsglobal</td>
						<td>Developer</td>
					</tr>
					<tr>
						<td>Ador Rahman</td>
						<td>Developer</td>
					</tr>
				</tbody>
			</table>
		</div>
		<script>
			function openCity(evt, cityName) {
				var i, tabcontent, tablinks;
				tabcontent = document.getElementsByClassName("tabcontent");
				for (i = 0; i < tabcontent.length; i++) {
					tabcontent[i].style.display = "none";
				}
				tablinks = document.getElementsByClassName("tablinks");
				for (i = 0; i < tablinks.length; i++) {
					tablinks[i].className = tablinks[i].className.replace(" active", "");
				}
				document.getElementById(cityName).style.display = "block";
				evt.currentTarget.className += " active";
			}

			// Get the element with id="defaultOpen" and click on it
			document.getElementById("defaultOpen").click();
		</script>
	</container>
</body>

</html>
