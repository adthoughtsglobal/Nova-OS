<!DOCTYPE html>
<html>

<head>
	<title>Files app</title>
	<meta name="description" content="Default Files app for Nova OS">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap');

		/* width */
		::-webkit-scrollbar {
			width: 5px;
		}

		/* Track */
		::-webkit-scrollbar-track {
			background: transparent;
		}

		/* Handle */
		::-webkit-scrollbar-thumb {
			background: #2b2b2b;
			border-radius: 5px;
		}

		/* Handle on hover */
		::-webkit-scrollbar-thumb:hover {
			background: #555;
		}

		html {
			height: 100%;
		}

		body {
			height: 100%;
			margin: 0;
			padding: 0;
			font-family: 'Poppins', sans-serif;
			color: white;
		}

		#flap-mot {
			display: block;
			box-sizing: border-box;
			overflow: hidden;
			background-color: #0e0e0e;
			height: calc(100% - 2px);
		}

		[flap-nav] y {
			displa: flex;
			background-color: #151515;
			width: 100%;
			flex-direction: row;
			flex-wrap: nowrap;
			align-items: center;
		}

		[flap-nav] {
			display: flex;
			height: 31px;
			flex-direction: row;
			flex-wrap: nowrap;
		}

		.flappsearch {
			flex-grow: 10;
			text-align: center;
			background: #191919;
			border-radius: 5px;
			font-size: 11px;
			padding: 2px !important;
			margin-top: -10px;
			color: #b8b8b8;
			border: 1px solid #414141;
			height: fit-content;
			transform: translate(-21px, 19px);
		}

		.nowid {
			width: 0px;
			padding: 5px;
		}

		.navbfobtns {
			font-size: 17px;
			background-color: #222222;
			border-radius: 50%;
			padding: 1px;
		}

		.setbtn {
			font-size: 17px;
			transform: translate(5px, 0px);
		}

		.sdfld {
			width: 90%;
			margin: auto;
			margin-bottom: 3px;
			background: linear-gradient(4deg, #151515 90%, #5dabff);
			border-radius: 5px;
			text-align: left;
			overflow: hidden;
			transition: 0.3s;
			text-overflow: ellipsis;
			white-space: nowrap;
			padding: 3px;
			cursor: pointer;
		}

		.sdfld:hover {
			color: dodgerblue;
		}

		[flap-sidenav] {
			width: 0;
			overflow-y: scroll;
			text-align: center;
			min-width: 98px;
			padding-bottom: 50px;
		}

		.themainstuff {
			margin: 10px 5px;
			display: flex;
			width: 100%;
			height: 100%;
		}

		[flap-fl-topnav] {
			display: block;
			flex-grow: 1;
			padding: 0px 10px;
			font-size: 9px;
			opacity: 70%;
			transform: translateY(7px);
		}
	</style>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
	<div id="flap-mot">
		<div flap-nav>
			<div style="flex-grow: 3;" class="nowid">
				<span class="material-symbols-rounded navbfobtns">
					arrow_back
				</span>
				<span class="material-symbols-rounded navbfobtns">
					arrow_forward
				</span>
			</div>
			<div class="nowid flappsearch">
				Files App
			</div>
			<div style="flex-grow: 1;" class="nowid"><span class="material-symbols-rounded setbtn">
					settings
				</span></div>
		</div>
		<div style="height: calc(100% - 58px);">
			<div class="themainstuff">
				<div flap-sidenav style="flex-grow: 1;
		height: 100%;">
					<small>This Device</small>
					<div id="folders">
						loading...
					</div>
					<div flap-sidenav-mems>

					</div>
				</div>
				<div flap-mains style="flex-grow: 3;
		display: flex;
		flex-direction: column;
		height: 100%;">
					<div flap-fl-topnav>
						device://*
					</div>
					<div flap-files style="flex-grow: 8; padding-bottom: 50px;padding: 10px;    padding-top: 5px;"
						id="filelist">

					</div>
					<div flap-fl-bottomnav style="width: 100%;
		flex-grow: 1;">

					</div>
				</div>
			</div>
		</div>
	</div>

	<script defer>
		const indexedDB = window.indexedDB || window.mozIndexedDB || window.webkitIndexedDB || window.msIndexedDB || window.shimIndexedDB;

		const dbPromise = indexedDB.open('my-database', 1);

		async function getDB(variableName) {
			const db = await dbPromise;
			const tx = db.transaction('store', 'readonly');
			const store = tx.objectStore('store');
			return store.get(variableName);
		}

		async function setDB(variableName, data) {
			const db = await dbPromise;
			const tx = db.transaction('store', 'readwrite');
			const store = tx.objectStore('store');
			store.put(data, variableName);
			await tx.complete;
		}

		var fllist = document.getElementById("filelist")
		var fdlist = document.getElementById("folders")

		// The core memmory structure
		var memmory = [
			// array with all folders
			{
				// folder
				"folderName": "Downloads",
				"content": [
					{
						"fileName": "demo",
						"type": "pure text",
						"content": "This is an example of a Nova Pure Text File."
					},
					{
						"fileName": "demo2",
						"type": "pure text",
						"content": "Another demo"
					}
				]
			},
			{
				// folder
				"folderName": "Apps",
				"content": [
					{
						"fileName": "App1",
						"type": "app",
						"content": "Demo Application1"
					},
					{
						"fileName": "App2",
						"type": "app",
						"content": "Demo Application2"
					}
				]
			}
		];

		function liststuff() {
			fdlist.innerText = ""
			memmory.forEach(obj => {
				let element = document.createElement('div');
				element.classList.add("sdfld");
				element.innerText = obj.folderName;
				element.setAttribute('onclick', "listFiles(this.innerText)")
				fdlist.appendChild(element);
			});
		}

		function listFiles(folderName) {
			fllist.innerText = "";

			// Find the folder with the given name
			const folder = memmory.find(folder => folder.folderName === folderName);

			if (folder) {
				// Display files in the folder
				if (folder.content && folder.content.length > 0) {
					folder.content.forEach(file => {
						let fileElement = document.createElement('div');
						fileElement.classList.add("file");
						fileElement.innerText = `File: ${file.fileName}, Type: ${file.type}, Content: ${file.content}`;
						fllist.appendChild(fileElement);
					});
				} else {
					console.log("Folder is empty");
				}
			} else {
				console.log("Folder not found");
			}
		}

		liststuff()
	</script>
</body>

</html>
